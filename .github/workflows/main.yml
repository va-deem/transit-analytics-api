name: CI and Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore dependencies
        run: dotnet restore
      - name: Build application
        run: dotnet build --no-restore
      - name: Run tests
        run: dotnet test --no-build --verbosity normal
      - name: Publish application
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet publish -c Release -o publish
      - name: Upload publish artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: publish
          path: publish/

  deploy_prod:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: publish
          path: publish/
      - name: Record deployed revision
        run: echo "${{ github.sha }}" > publish/REVISION
      - name: Prepare server and stop service
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo install -m 600 /dev/null /etc/transit-analytics-api.env
            sudo bash -c 'cat > /etc/transit-analytics-api.env <<EOF
            ConnectionStrings__DefaultConnection=${{ secrets.PROD_CONNECTION_STRING }}
            AucklandTransport__SubscriptionKey=${{ secrets.PROD_AT_SUBSCRIPTION_KEY }}
            Admin__PasswordHash=${{ secrets.PROD_ADMIN_PASSWORD_HASH }}
            ASPNETCORE_ENVIRONMENT=Production
            EOF'
            sudo systemctl stop transit-analytics-api
            rm -rf /home/deploy/TransitAnalyticsAPI/*
      - name: Copy published files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "publish/*"
          target: "/home/deploy/TransitAnalyticsAPI/"
          strip_components: 1
      - name: Restart service and verify status
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: deploy
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo systemctl restart transit-analytics-api
            sudo systemctl status transit-analytics-api --no-pager
      - name: Check health endpoint
        env:
          PROD_HEALTHCHECK_URL: ${{ secrets.PROD_HEALTHCHECK_URL }}
        run: |
          if [ -z "$PROD_HEALTHCHECK_URL" ]; then
            echo "PROD_HEALTHCHECK_URL is not set. Skipping health check."
            exit 0
          fi

          for attempt in 1 2 3 4 5 6; do
            response="$(curl --silent --show-error --fail "$PROD_HEALTHCHECK_URL")"

            if echo "$response" | grep -q '"status":"ok"'; then
              echo "Health check passed on attempt $attempt."
              exit 0
            fi

            echo "Health check at $PROD_HEALTHCHECK_URL not ready on attempt $attempt. Retrying in 5 seconds..."
            sleep 5
          done

          echo "Health check failed for $PROD_HEALTHCHECK_URL after 6 attempts."
          exit 1
